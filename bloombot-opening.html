<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bloombot — Opening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1612; --cream: #f5f0e8; --warm: #e8dcc8;
      --rust: #c4541a; --amber: #d97706; --forest: #2d5a27;
      --slate: #64748b; --border: #d1c4aa; --shadow: rgba(26,22,18,0.10);
      --lightning: #1e3a5f;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--ink);
      color: #fff;
    }

    /* ── Full-screen canvas ── */
    .opening {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Lightning container — rotated 90° so zigzags run top-to-bottom */
    #lightningCanvas {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.2s ease-in;
      z-index: 1;
    }
    #lightningCanvas.visible { opacity: 1; }

    #lightningCanvas svg {
      position: absolute;
    }

    /* Center content */
    .brand {
      position: relative;
      z-index: 10;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      animation: fadeUp 1.6s ease-out 0.8s forwards;
    }
    .brand h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 1;
      color: var(--amber);
      text-shadow: 0 0 80px rgba(217,119,6,0.3), 0 0 160px rgba(217,119,6,0.1);
    }
    .brand .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.65rem, 1.4vw, 0.85rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 1rem;
    }
    .brand .tliish {
      font-size: clamp(0.55rem, 1vw, 0.7rem);
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.12);
      margin-top: 0.75rem;
    }

    /* Enter link */
    .enter-link {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      animation: fadeUp 1.2s ease-out 2s forwards;
    }
    .enter-link a {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      padding: 0.6rem 1.6rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .enter-link a:hover {
      color: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 20px rgba(217,119,6,0.15);
    }

    /* Palette selector */
    .palette-picker {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 20;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      opacity: 0;
      animation: fadeUp 1s ease-out 2.5s forwards;
    }
    .palette-picker label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .palette-picker select {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .palette-picker select:focus { outline: none; border-color: var(--amber); }
    .palette-picker select option { background: var(--ink); color: #fff; }

    /* Vignette overlay */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(26,22,18,0.7) 100%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Fix transform for enter-link (has translateX) */
    .enter-link {
      animation: fadeUpCenter 1.2s ease-out 2s forwards;
    }
    @keyframes fadeUpCenter {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<div class="opening">
  <!-- Lightning bolts rendered here -->
  <div id="lightningCanvas"></div>

  <!-- Vignette to frame the center -->
  <div class="vignette"></div>

  <!-- Brand -->
  <div class="brand">
    <h1>bloombot</h1>
    <div class="subtitle">stories · prototyping · scaffolds</div>
    <div class="tliish">Tłʼiish &nbsp; · &nbsp; lightning</div>
  </div>

  <!-- Palette picker -->
  <div class="palette-picker">
    <label>Palette</label>
    <select id="paletteSelect">
      <option value="sunset" selected>Sunset</option>
      <option value="sunrise">Sunrise</option>
      <option value="blues">Blues</option>
      <option value="pinks">Pinks</option>
      <option value="greens">Greens</option>
      <option value="greys">Greys</option>
      <option value="purples">Purples</option>
    </select>
  </div>

  <!-- Enter -->
  <div class="enter-link">
    <a href="bloombot-modern.html">Enter</a>
  </div>
</div>

<script>
// ─── Palettes (from the Lightning generator) ───
const colorPalettes = {
  "sunrise": ['#fff9f5','#fff5eb','#fff0e0','#ffebd6','#ffe5cc','#ffdfc2','#ffd9b8','#ffd3ae','#ffcda4','#ffc79a','#ffc190','#ffbb86','#ffb57c','#ffaf72','#ffa968','#ffa35e','#ff9d54','#ff974a','#ff9140','#ff8b36','#ff852c'],
  "blues": ['#ffc0cb','#f8b7ce','#f2afd1','#eba6d4','#e49dd7','#dd95da','#d58cdd','#ce84e0','#c67be2','#bd73e5','#b56ae8','#ab61ea','#a259ed','#9850ef','#8d47f1','#813ef4','#7435f6','#642bf8','#5220fb','#3a13fd','#0000ff'],
  "pinks": ['#ffe0eb','#ffdbe9','#ffd6e7','#ffd2e5','#ffcde3','#ffc8e1','#ffc3e0','#ffbfde','#ffbadc','#ffb5da','#ffb0d8','#ffabd6','#ffa6d4','#ffa1d2','#ff9bd1','#ff96cf','#ff91cd','#ff8bcb','#ff85c9','#ff80c7','#ff7ac5','#ff73c3','#ff6dc1','#ff66bf','#ff5fbd','#ff57bb'],
  "greens": ['#ffe0eb','#f6dbe2','#edd5da','#e4d0d2','#dbcbc9','#d2c6c1','#c9c0b9','#c1bbb0','#b8b6a8','#afb1a0','#a6ab98','#9ea690','#95a188','#8d9c81','#849779','#7c9171','#738c6a','#6b8762','#62825b','#5a7d53','#51784c'],
  "greys": ['#c6a9b3','#bfa4ae','#b89fa8','#b19aa2','#aa959d','#a49097','#9d8c92','#96878c','#8f8287','#897e81','#82797c','#7c7477','#757072','#6f6b6c','#686767','#9dadb5','#9aa5a9','#969d9e','#919593','#8c8e89','#868680','#817f77','#7b786e','#757066','#6f695d','#686356','#625c4e','#5c5546','#554e3f','#4f4838'],
  "purples": ['#b89ff5','#bd98ea','#c190e0','#c489d6','#c781cc','#c97ac2','#cb72b9','#cd6aaf','#ce62a5','#cf599c','#cf5092','#cf4689','#cf3b80','#cf2f77','#cf1f6e','#2d6c94','#416e96','#507098','#5d739b','#68759e','#7278a2','#7b7aa8','#827dae','#8980b5','#8f83bd','#9386c7','#9689d2','#968ddf','#9491ee','#8e96ff'],
  "sunset": ['#ffd653','#fece4f','#fdc64a','#fcbe46','#fbb642','#faae3e','#f9a639','#f79e35','#f59531','#f48d2d','#f28428','#f07c24','#ee7320','#ec6a1c','#ea6017','#e75613','#e54c0f','#e2400a','#e03306','#dd2203','#da0000']
};

// ─── Lightning algorithm (adapted from the generator) ───

function pickTwo(palette) {
  // Pick two colors from opposite ends of the palette for contrast
  const colors = colorPalettes[palette];
  const len = colors.length;
  const i1 = Math.floor(Math.random() * Math.floor(len * 0.35));              // early in palette
  const i2 = Math.floor(len * 0.65 + Math.random() * Math.floor(len * 0.35)); // late in palette
  return [colors[i1], colors[i2]];
}

function buildBolt(container, w, h, zigzags, thickness, color, offsetX, offsetY, rotation) {
  const vbW = w * 1.1;
  const vbH = h + thickness * 2;

  const svg = d3.select(container).append("svg")
    .attr("width", vbW)
    .attr("height", vbH)
    .attr("viewBox", `0 ${-thickness} ${vbW + thickness} ${vbH + thickness}`)
    .attr("xmlns", "http://www.w3.org/2000/svg")
    .style("position", "absolute")
    .style("left", `${offsetX}px`)
    .style("top", `${offsetY}px`)
    .style("transform", `rotate(${rotation}deg)`)
    .style("transform-origin", "center center");

  const line = d3.line().x(d => d[0]).y(d => d[1]);
  const data = [];
  for (let i = 0; i < zigzags; i++) {
    data.push([(i * w) / zigzags, ((i % 2 === 0) ? 0 : h) + thickness]);
  }

  svg.append("path")
    .attr("d", line(data))
    .attr("stroke", color)
    .attr("stroke-width", thickness)
    .attr("fill", "none")
    .attr("stroke-linecap", "round")
    .attr("stroke-linejoin", "round")
    .style("opacity", 0.85);

  return svg;
}

function generateOpening() {
  const canvas = document.getElementById("lightningCanvas");
  canvas.innerHTML = "";
  canvas.classList.remove("visible");

  const palette = document.getElementById("paletteSelect").value;
  const [colorA, colorB] = pickTwo(palette);

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const diagonal = Math.sqrt(vw * vw + vh * vh);

  // --- Single bolt that traverses the viewport diagonally ---
  // We'll create layered zigzag bands (like the generator does 12 layers)
  // but oriented diagonally across the screen, with the top-half bands
  // colored from colorA and the bottom-half from colorB.

  const numLayers = 12;
  const boltWidth = diagonal * 1.1;
  const baseHeight = Math.max(24, vh * 0.025);
  const maxThickness = Math.max(8, vh * 0.012);
  const baseZigzags = 50;

  // Calculate placement so the bolt crosses center diagonally
  const angle = Math.atan2(vh, vw) * (180 / Math.PI);  // ~30-55° depending on aspect
  const centerX = vw / 2;
  const centerY = vh / 2;

  for (let i = 0; i < numLayers; i++) {
    const t = Math.random() * maxThickness + 1;
    const zz = Math.floor(Math.random() * baseZigzags) + baseZigzags / 2;
    const h = baseHeight * (0.6 + Math.random() * 0.8);

    // Split: top layers get colorA, bottom layers get colorB
    // With a blend zone in the middle
    const ratio = i / (numLayers - 1);
    let color;
    if (ratio < 0.4) {
      color = colorA;
    } else if (ratio > 0.6) {
      color = colorB;
    } else {
      // Blend zone — randomly pick either
      color = Math.random() < 0.5 ? colorA : colorB;
    }

    // Slight vertical spread so layers fan out
    const spread = (i - numLayers / 2) * (maxThickness * 4.8);

    // Position so the rotated bolt crosses the center
    const ox = centerX - boltWidth / 2;
    const oy = centerY - baseHeight / 2 + spread;

    const svg = buildBolt(canvas, boltWidth, h, zz, t, color, ox, oy, angle);

    // Add subtle glow to thicker strokes
    if (t > maxThickness * 0.6) {
      svg.select("path")
        .style("filter", `drop-shadow(0 0 ${Math.round(t)}px ${color})`);
    }
  }

  // Fade in
  requestAnimationFrame(() => {
    canvas.classList.add("visible");
  });
}

// ─── Init ───
window.addEventListener("load", generateOpening);
window.addEventListener("resize", generateOpening);
document.getElementById("paletteSelect").addEventListener("change", generateOpening);
</script>

</body>
</html>
