<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lines over Black and White Background</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* Container for the alternating sections */
  .section {
    height: 150px; /* Height of each section */
    position: relative;
  }

  .black {
    background-color: black;
  }

  .white {
    background-color: white;
  }

  /* Overlay lines */
  .lines {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(255,220,180,0.055)
      rgba(255,220,180,0.055) 2px,
/*      rgba(255, 220, 180, 0.11),*/
/*      rgba(255, 220, 180, 0.11) 2px,*/
      transparent 2px,
      transparent 6px
    );
    pointer-events: none; /* So lines don't block interaction */
  }
</style>
</head>
<body>

<div class="section black">
  <div class="lines"></div>
</div>

<div class="section white">
  <div class="lines"></div>
</div>

<div class="section black">
  <div class="lines"></div>
</div>

<div class="section white">
  <div class="lines"></div>
</div>

</body>
</html>
