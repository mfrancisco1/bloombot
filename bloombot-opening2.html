<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bloombot — Opening II</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1612; --cream: #f5f0e8; --warm: #e8dcc8;
      --rust: #c4541a; --amber: #d97706; --forest: #2d5a27;
      --slate: #64748b; --border: #d1c4aa; --shadow: rgba(26,22,18,0.10);
      --lightning: #1e3a5f;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--ink);
      color: #fff;
    }

    .opening {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #lightningCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    #lightningCanvas svg {
      position: absolute;
      left: 0;
    }

    /* Each SVG path gets clipped by a rect that animates from 0 to full width */
    #lightningCanvas svg path {
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      position: relative;
      z-index: 10;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      animation: fadeUp 1.6s ease-out 0.6s forwards;
    }
    .brand h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      transition: color 0.6s ease, text-shadow 0.6s ease;
    }

    .enter-link {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      z-index: 10;
      opacity: 0;
      animation: fadeUpCenter 1.2s ease-out 2s forwards;
    }
    .enter-link a {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      padding: 0.6rem 1.6rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .enter-link a:hover {
      color: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 20px rgba(217,119,6,0.15);
    }

    .palette-picker {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 20;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      opacity: 0;
      animation: fadeUp 1s ease-out 2.5s forwards;
    }
    .palette-picker label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .palette-picker select {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .palette-picker select:focus { outline: none; border-color: var(--amber); }
    .palette-picker select option { background: var(--ink); color: #fff; }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(26,22,18,0.7) 100%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUpCenter {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<div class="opening">
  <div id="lightningCanvas"></div>
  <div class="vignette"></div>

  <div class="brand">
    <h1 id="brandTitle">bloombot</h1>
  </div>

  <div class="palette-picker">
    <label>Palette</label>
    <select id="paletteSelect">
      <option value="sunset" selected>Sunset</option>
      <option value="sunrise">Sunrise</option>
      <option value="blues">Blues</option>
      <option value="pinks">Pinks</option>
      <option value="greens">Greens</option>
      <option value="greys">Greys</option>
      <option value="purples">Purples</option>
    </select>
  </div>

  <div class="enter-link">
    <a href="bloombot-modern.html">Enter</a>
  </div>
</div>

<script>
// ─── Palettes (from the Lightning generator) ───
const colorPalettes = {
  "sunrise": ['#fff9f5','#fff5eb','#fff0e0','#ffebd6','#ffe5cc','#ffdfc2','#ffd9b8','#ffd3ae','#ffcda4','#ffc79a','#ffc190','#ffbb86','#ffb57c','#ffaf72','#ffa968','#ffa35e','#ff9d54','#ff974a','#ff9140','#ff8b36','#ff852c'],
  "blues": ['#ffc0cb','#f8b7ce','#f2afd1','#eba6d4','#e49dd7','#dd95da','#d58cdd','#ce84e0','#c67be2','#bd73e5','#b56ae8','#ab61ea','#a259ed','#9850ef','#8d47f1','#813ef4','#7435f6','#642bf8','#5220fb','#3a13fd','#0000ff'],
  "pinks": ['#ffe0eb','#ffdbe9','#ffd6e7','#ffd2e5','#ffcde3','#ffc8e1','#ffc3e0','#ffbfde','#ffbadc','#ffb5da','#ffb0d8','#ffabd6','#ffa6d4','#ffa1d2','#ff9bd1','#ff96cf','#ff91cd','#ff8bcb','#ff85c9','#ff80c7','#ff7ac5','#ff73c3','#ff6dc1','#ff66bf','#ff5fbd','#ff57bb'],
  "greens": ['#ffe0eb','#f6dbe2','#edd5da','#e4d0d2','#dbcbc9','#d2c6c1','#c9c0b9','#c1bbb0','#b8b6a8','#afb1a0','#a6ab98','#9ea690','#95a188','#8d9c81','#849779','#7c9171','#738c6a','#6b8762','#62825b','#5a7d53','#51784c'],
  "greys": ['#c6a9b3','#bfa4ae','#b89fa8','#b19aa2','#aa959d','#a49097','#9d8c92','#96878c','#8f8287','#897e81','#82797c','#7c7477','#757072','#6f6b6c','#686767','#9dadb5','#9aa5a9','#969d9e','#919593','#8c8e89','#868680','#817f77','#7b786e','#757066','#6f695d','#686356','#625c4e','#5c5546','#554e3f','#4f4838'],
  "purples": ['#b89ff5','#bd98ea','#c190e0','#c489d6','#c781cc','#c97ac2','#cb72b9','#cd6aaf','#ce62a5','#cf599c','#cf5092','#cf4689','#cf3b80','#cf2f77','#cf1f6e','#2d6c94','#416e96','#507098','#5d739b','#68759e','#7278a2','#7b7aa8','#827dae','#8980b5','#8f83bd','#9386c7','#9689d2','#968ddf','#9491ee','#8e96ff'],
  "sunset": ['#ffd653','#fece4f','#fdc64a','#fcbe46','#fbb642','#faae3e','#f9a639','#f79e35','#f59531','#f48d2d','#f28428','#f07c24','#ee7320','#ec6a1c','#ea6017','#e75613','#e54c0f','#e2400a','#e03306','#dd2203','#da0000']
};

// ─── Pick two contrasting colors from the palette ───
function pickTwo(palette) {
  const colors = colorPalettes[palette];
  const len = colors.length;
  const i1 = Math.floor(Math.random() * Math.floor(len * 0.35));
  const i2 = Math.floor(len * 0.65 + Math.random() * Math.floor(len * 0.35));
  return [colors[i1], colors[i2]];
}

// ─── Build a single horizontal zigzag bolt that translates across the screen ───
function buildAnimatedBolt(container, w, h, zigzags, thickness, color, yPos, duration) {
  const vbW = w * 1.1;
  const vbH = h + thickness * 2;

  // Start off-screen left: translate from -boltWidth to +viewportWidth
  const svg = d3.select(container).append("svg")
    .attr("width", vbW)
    .attr("height", vbH)
    .attr("viewBox", `0 ${-thickness} ${vbW + thickness} ${vbH + thickness}`)
    .attr("xmlns", "http://www.w3.org/2000/svg")
    .style("position", "absolute")
    .style("top", `${yPos}px`)
    .style("left", `${-vbW}px`);

  const line = d3.line().x(d => d[0]).y(d => d[1]);
  const data = [];
  for (let i = 0; i < zigzags; i++) {
    data.push([(i * w) / zigzags, ((i % 2 === 0) ? 0 : h) + thickness]);
  }

  const path = svg.append("path")
    .attr("d", line(data))
    .attr("stroke", color)
    .attr("stroke-width", thickness)
    .attr("fill", "none")
    .attr("stroke-linecap", "round")
    .attr("stroke-linejoin", "round")
    .style("opacity", 0.85);

  // Add glow for thicker bolts
  if (thickness > 4) {
    path.style("filter", `drop-shadow(0 0 ${Math.round(thickness * 0.8)}px ${color})`);
  }

  // Animate: slide from off-screen left to off-screen right
  const totalTravel = vbW + window.innerWidth;
  svg.transition()
    .duration(duration)
    .ease(d3.easeLinear)
    .style("left", `${window.innerWidth}px`);

  return svg;
}

// ─── Main generation ───
function generateOpening() {
  const canvas = document.getElementById("lightningCanvas");
  canvas.innerHTML = "";

  const palette = document.getElementById("paletteSelect").value;
  const [colorA, colorB] = pickTwo(palette);

  // Color the brand title from the palette — use the brighter of the two
  const brandEl = document.getElementById("brandTitle");
  brandEl.style.color = colorA;
  brandEl.style.textShadow = `0 0 40px ${colorA}44, 0 0 80px ${colorA}22`;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Random number of bolts between 8 and 24
  const numBolts = Math.floor(Math.random() * 17) + 8;

  // Calculate vertical spacing so bolts don't touch
  const baseHeight = 18;
  const maxThickness = 10;

  // Total available height, with some top/bottom margin
  const margin = 30;
  const availableHeight = vh - margin * 2;

  // Evenly distribute bolt center-lines with gaps
  const spacing = availableHeight / numBolts;

  // Bolt width — full viewport so the zigzag covers the screen while sliding
  const boltWidth = vw;
  const baseZigzags = 50;

  for (let i = 0; i < numBolts; i++) {
    // Randomize per-bolt parameters (from the original algorithm)
    const t = Math.random() * maxThickness + 1;
    const zz = Math.floor(Math.random() * baseZigzags) + baseZigzags / 2;
    const h = baseHeight * (0.4 + Math.random() * 0.6);

    // Position: evenly spaced, centered in their slot
    const yCenter = margin + spacing * i + spacing / 2;
    const yPos = yCenter - (h + t * 2) / 2;

    // Alternate colors: top half colorA, bottom half colorB
    const ratio = i / (numBolts - 1);
    let color;
    if (ratio < 0.45) {
      color = colorA;
    } else if (ratio > 0.55) {
      color = colorB;
    } else {
      color = Math.random() < 0.5 ? colorA : colorB;
    }

    // Duration: quick but varied — 600ms to 1800ms
    const duration = 600 + Math.random() * 1200;

    // Stagger start: each bolt begins slightly after the previous
    // but with some randomness so they don't look mechanical
    const delay = i * 80 + Math.random() * 150;

    setTimeout(() => {
      buildAnimatedBolt(canvas, boltWidth, h, zz, t, color, yPos, duration);
    }, delay);
  }
}

// ─── Init ───
window.addEventListener("load", generateOpening);
window.addEventListener("resize", generateOpening);
document.getElementById("paletteSelect").addEventListener("change", generateOpening);
</script>

</body>
</html>
