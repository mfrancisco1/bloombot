<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bloombot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1612; --rust: #c4541a; --amber: #d97706; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--ink);
      color: #fff;
      transition: background 0.5s ease;
    }
    body.light-mode { background: #fff; }

    .opening {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #latticeCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(26,22,18,0.72) 100%);
      transition: background 0.5s ease;
    }
    body.light-mode .vignette {
      background: radial-gradient(ellipse at center, transparent 30%, rgba(255,255,255,0.72) 100%);
    }

    /* ── Centre UI ── */
    .center-zone {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.3rem;
      padding: 2.5rem 3rem;
    }

    .brand h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.35s forwards;
    }

    .palette-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.65s forwards;
    }
    .palette-row label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    body.light-mode .palette-row label { color: rgba(0,0,0,0.38); }

    .palette-row select {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .palette-row select:focus { outline: none; border-color: var(--amber); }
    .palette-row select option { background: #1a1612; color: #fff; }
    body.light-mode .palette-row select {
      background: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.55);
      border-color: rgba(0,0,0,0.14);
    }

    .enter-btn {
      opacity: 0;
      animation: fadeUp 0.9s ease-out 1.0s forwards;
    }
    .enter-btn a {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      padding: 0.6rem 1.6rem;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 4px;
      transition: all 0.3s ease;
      display: inline-block;
    }
    .enter-btn a:hover {
      color: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 24px rgba(217,119,6,0.18);
    }
    body.light-mode .enter-btn a { color: rgba(0,0,0,0.35); border-color: rgba(0,0,0,0.14); }
    body.light-mode .enter-btn a:hover { color: var(--rust); border-color: var(--rust); }

    .theme-toggle-zone {
      position: absolute;
      bottom: 0; left: 0;
      width: 20%; height: 20%;
      z-index: 25;
      cursor: pointer;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="opening">
  <canvas id="latticeCanvas"></canvas>
  <div class="vignette"></div>

  <div class="center-zone" id="centerZone">
    <div class="brand">
      <h1 id="brandTitle">bloombot</h1>
    </div>
    <div class="palette-row">
      <label>Palette</label>
      <select id="paletteSelect">
        <option value="sunrise" selected>Sunrise</option>
        <option value="blues">Blues</option>
        <option value="pinks">Pinks</option>
        <option value="greens">Greens</option>
        <option value="greys">Greys</option>
        <option value="purples">Purples</option>
        <option value="sunset">Sunset</option>
      </select>
    </div>
    <div class="enter-btn">
      <a href="bloombot-home.html">Enter</a>
    </div>
    <div style="margin-top:0.5rem; text-align:center;">
      <a href="bloombot - Lattice.html" style="font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-decoration:none;" onmouseover="this.style.color='rgba(255,255,255,0.65)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">lattice generator</a>
    </div>
  </div>

  <div class="theme-toggle-zone" id="themeToggle"></div>
</div>

<script>
// ─── Palettes ─────────────────────────────────────────────────────────────
const colorPalettes = {
  sunrise:  ['#fff9f5','#fff5eb','#fff0e0','#ffebd6','#ffe5cc','#ffdfc2','#ffd9b8','#ffd3ae','#ffcda4','#ffc79a','#ffc190','#ffbb86','#ffb57c','#ffaf72','#ffa968','#ffa35e','#ff9d54','#ff974a','#ff9140','#ff8b36','#ff852c'],
  blues:    ['#ffc0cb','#f8b7ce','#f2afd1','#eba6d4','#e49dd7','#dd95da','#d58cdd','#ce84e0','#c67be2','#bd73e5','#b56ae8','#ab61ea','#a259ed','#9850ef','#8d47f1','#813ef4','#7435f6','#642bf8','#5220fb','#3a13fd','#0000ff'],
  pinks:    ['#ffe0eb','#ffdbe9','#ffd6e7','#ffd2e5','#ffcde3','#ffc8e1','#ffc3e0','#ffbfde','#ffbadc','#ffb5da','#ffb0d8','#ffabd6','#ffa6d4','#ffa1d2','#ff9bd1','#ff96cf','#ff91cd','#ff8bcb','#ff85c9','#ff80c7','#ff7ac5','#ff73c3','#ff6dc1','#ff66bf','#ff5fbd','#ff57bb'],
  greens:   ['#ffe0eb','#f6dbe2','#edd5da','#e4d0d2','#dbcbc9','#d2c6c1','#c9c0b9','#c1bbb0','#b8b6a8','#afb1a0','#a6ab98','#9ea690','#95a188','#8d9c81','#849779','#7c9171','#738c6a','#6b8762','#62825b','#5a7d53','#51784c'],
  greys:    ['#c6a9b3','#bfa4ae','#b89fa8','#b19aa2','#aa959d','#a49097','#9d8c92','#96878c','#8f8287','#897e81','#82797c','#7c7477','#757072','#6f6b6c','#686767','#9dadb5','#9aa5a9','#969d9e','#919593','#8c8e89','#868680','#817f77','#7b786e','#757066','#6f695d','#686356','#625c4e','#5c5546','#554e3f','#4f4838'],
  purples:  ['#b89ff5','#bd98ea','#c190e0','#c489d6','#c781cc','#c97ac2','#cb72b9','#cd6aaf','#ce62a5','#cf599c','#cf5092','#cf4689','#cf3b80','#cf2f77','#cf1f6e','#2d6c94','#416e96','#507098','#5d739b','#68759e','#7278a2','#7b7aa8','#827dae','#8980b5','#8f83bd','#9386c7','#9689d2','#968ddf','#9491ee','#8e96ff'],
  sunset:   ['#ffd653','#fece4f','#fdc64a','#fcbe46','#fbb642','#faae3e','#f9a639','#f79e35','#f59531','#f48d2d','#f28428','#f07c24','#ee7320','#ec6a1c','#ea6017','#e75613','#e54c0f','#e2400a','#e03306','#dd2203','#da0000'],
};

// ─── Settings ─────────────────────────────────────────────────────────────
const BASE_W      = 12;   // rect base width
const BASE_H      = 10;   // rect base height
const SPACING     = 2;    // gap between rects
const VARIATION   = 99;   // size variation %
const COUNT       = 1000; // number of rects
const CLEAR_PAD   = 12;   // clear zone breathing room (a little extra for sway)

// Wind shimmer parameters
const WAVE_SPREAD = 0.006; // phase shift per px of x — controls wave wavelength
const SHIMMER_W   = 0.08;  // width oscillation amplitude (fraction of base width)
const SHIMMER_H   = 0.05;  // height oscillation amplitude
const SWAY_Y      = 2.8;   // max vertical sway in px
const ROT_AMP     = 0.038; // max rotation in radians (~2.2°)
const OPACITY_MIN = 0.55;  // dimmest a rect gets during shimmer
const OPACITY_MAX = 0.95;  // brightest a rect gets (non-sparkle)

// Sparkle parameters
const SPARKLE_DUR_MIN = 700;   // ms — shortest sparkle
const SPARKLE_DUR_MAX = 1200;  // ms — longest sparkle
const SPARKLE_INTERVAL_MIN = 900;   // ms between sparkles
const SPARKLE_INTERVAL_MAX = 2800;

let lightMode       = false;
let rects           = [];   // built once per init
let frameId         = null;
let sparkleTimeout  = null;
let sparkle         = null; // { idx, t0, dur }

// ─── Helpers ──────────────────────────────────────────────────────────────
function hexBrightness(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 0.299*r + 0.587*g + 0.114*b;
}

function updateBrandColor() {
  const colors  = colorPalettes[document.getElementById('paletteSelect').value];
  const brandEl = document.getElementById('brandTitle');
  const pick    = lightMode
    ? colors.reduce((a,b) => hexBrightness(a) < hexBrightness(b) ? a : b)
    : colors.reduce((a,b) => hexBrightness(a) > hexBrightness(b) ? a : b);
  brandEl.style.color      = pick;
  brandEl.style.textShadow = `0 0 40px ${pick}55, 0 0 80px ${pick}22`;
}

// Blend a hex colour toward white by amount 0–1
function lightenHex(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const lr = Math.round(r + (255-r)*amt);
  const lg = Math.round(g + (255-g)*amt);
  const lb = Math.round(b + (255-b)*amt);
  return `rgb(${lr},${lg},${lb})`;
}

function aabbOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ─── Build rects (one-time, synchronous) ──────────────────────────────────
function buildRects(vw, vh) {
  const czRect = document.getElementById('centerZone').getBoundingClientRect();
  const czX = czRect.left   - CLEAR_PAD;
  const czY = czRect.top    - CLEAR_PAD;
  const czW = czRect.width  + CLEAR_PAD * 2;
  const czH = czRect.height + CLEAR_PAD * 2;

  const colors = colorPalettes[document.getElementById('paletteSelect').value];

  // Spatial hash for collision detection
  const CELL  = 32;
  const gcols = Math.ceil(vw / CELL);
  const grows = Math.ceil(vh / CELL);
  const grid  = new Array(gcols * grows).fill(null).map(() => []);

  function cellsFor(x,y,w,h,pad) {
    return {
      c0: Math.max(0,       Math.floor((x-pad)/CELL)),
      c1: Math.min(gcols-1, Math.floor((x+w+pad)/CELL)),
      r0: Math.max(0,       Math.floor((y-pad)/CELL)),
      r1: Math.min(grows-1, Math.floor((y+h+pad)/CELL)),
    };
  }
  function register(r) {
    const {c0,c1,r0,r1} = cellsFor(r.x,r.y,r.w,r.h,0);
    for (let rr=r0;rr<=r1;rr++) for (let cc=c0;cc<=c1;cc++) grid[rr*gcols+cc].push(r);
  }
  function collides(x,y,w,h) {
    const {c0,c1,r0,r1} = cellsFor(x,y,w,h,SPACING);
    for (let rr=r0;rr<=r1;rr++)
      for (let cc=c0;cc<=c1;cc++)
        for (const r of grid[rr*gcols+cc])
          if (aabbOverlap(x-SPACING,y-SPACING,w+SPACING*2,h+SPACING*2,r.x,r.y,r.w,r.h))
            return true;
    return false;
  }

  rects = [];
  for (let i = 0; i < COUNT; i++) {
    for (let a = 0; a < 60; a++) {
      const vf = Math.random() * VARIATION / 100;
      const w  = BASE_W * (1 + vf);
      const h  = BASE_H * (1 + vf);
      const x  = Math.random() * (vw - w);
      const y  = Math.random() * (vh - h);
      if (aabbOverlap(x,y,w,h, czX,czY,czW,czH)) continue;
      if (collides(x,y,w,h)) continue;

      rects.push({
        x, y, w, h,
        cx: x + w/2,     // centre — we rotate around this
        cy: y + h/2,
        color: colors[Math.floor(Math.random() * colors.length)],
        // Each rect has its own oscillation character
        phase:  Math.random() * Math.PI * 2,
        freq:   0.55 + Math.random() * 0.7,   // oscillation speed
        freq2:  0.30 + Math.random() * 0.45,  // secondary (slower) wave
      });
      register({ x, y, w, h });
      break;
    }
  }
}

// ─── Animation loop ───────────────────────────────────────────────────────
function drawFrame(now) {
  const t      = now * 0.001;  // seconds
  const canvas = document.getElementById('latticeCanvas');
  const ctx    = canvas.getContext('2d');
  const vw     = canvas.width;
  const vh     = canvas.height;

  ctx.fillStyle = lightMode ? '#ffffff' : '#1a1612';
  ctx.fillRect(0, 0, vw, vh);

  // Resolve current sparkle progress (0–1, bell-shaped)
  let sparkleIdx = -1;
  let sparkleBoost = 0;
  if (sparkle) {
    const age = (now - sparkle.t0) / sparkle.dur;
    if (age >= 1) {
      sparkle = null;
    } else {
      sparkleIdx   = sparkle.idx;
      sparkleBoost = Math.sin(age * Math.PI);   // 0 → 1 → 0 over lifetime
    }
  }

  for (let i = 0; i < rects.length; i++) {
    const r = rects[i];

    // ── Wind shimmer ──
    // Primary wave: propagates left-to-right across the field
    const wavePhase = r.phase + r.cx * WAVE_SPREAD;
    const s1 = Math.sin(t * r.freq  + wavePhase);
    // Secondary wave: slower, different propagation for turbulence
    const s2 = Math.sin(t * r.freq2 + wavePhase * 0.8 + r.phase * 0.5);
    const combined = s1 * 0.65 + s2 * 0.35;

    const drawW   = r.w * (1 + SHIMMER_W * s1);
    const drawH   = r.h * (1 + SHIMMER_H * s2);
    const offsetY = SWAY_Y * combined;
    const angle   = ROT_AMP * s1;
    const opacity = OPACITY_MIN + (OPACITY_MAX - OPACITY_MIN) * (0.5 + 0.5 * combined);

    // ── Sparkle override ──
    const isSparkling = (i === sparkleIdx);
    const scaleBoost  = isSparkling ? 1 + 0.35 * sparkleBoost : 1;
    const opacBoost   = isSparkling ? sparkleBoost * 0.5 : 0;
    const color       = isSparkling
      ? lightenHex(r.color, sparkleBoost * 0.75)
      : r.color;

    ctx.save();
    ctx.globalAlpha = Math.min(1, opacity + opacBoost);
    ctx.translate(r.cx, r.cy + offsetY);
    ctx.rotate(angle);

    if (isSparkling && sparkleBoost > 0.05) {
      // Soft glow ring — drawn before the rect so it sits behind
      ctx.shadowColor = lightenHex(r.color, 0.9);
      ctx.shadowBlur  = 18 * sparkleBoost;
    }

    ctx.fillStyle = color;
    ctx.fillRect(
      -drawW / 2 * scaleBoost,
      -drawH / 2 * scaleBoost,
       drawW * scaleBoost,
       drawH * scaleBoost
    );

    // Reset shadow immediately so it doesn't bleed to other rects
    if (isSparkling) ctx.shadowBlur = 0;

    ctx.restore();
  }

  frameId = requestAnimationFrame(drawFrame);
}

// ─── Sparkle scheduling ───────────────────────────────────────────────────
function scheduleNextSparkle() {
  const delay = SPARKLE_INTERVAL_MIN
    + Math.random() * (SPARKLE_INTERVAL_MAX - SPARKLE_INTERVAL_MIN);
  sparkleTimeout = setTimeout(() => {
    sparkle = {
      idx: Math.floor(Math.random() * rects.length),
      t0:  performance.now(),
      dur: SPARKLE_DUR_MIN + Math.random() * (SPARKLE_DUR_MAX - SPARKLE_DUR_MIN),
    };
    scheduleNextSparkle();
  }, delay);
}

// ─── Init ─────────────────────────────────────────────────────────────────
function startLoop() {
  if (frameId)       cancelAnimationFrame(frameId);
  if (sparkleTimeout) clearTimeout(sparkleTimeout);
  sparkle = null;

  const canvas  = document.getElementById('latticeCanvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  buildRects(canvas.width, canvas.height);
  updateBrandColor();

  frameId = requestAnimationFrame(drawFrame);
  scheduleNextSparkle();
}

// ─── Events ───────────────────────────────────────────────────────────────
document.getElementById('themeToggle').addEventListener('click', () => {
  lightMode = !lightMode;
  document.body.classList.toggle('light-mode', lightMode);
  updateBrandColor();
  // Rebuild so background colour in the offscreen matches
  const canvas = document.getElementById('latticeCanvas');
  buildRects(canvas.width, canvas.height);
});

document.getElementById('paletteSelect').addEventListener('change', () => {
  updateBrandColor();
  const canvas = document.getElementById('latticeCanvas');
  buildRects(canvas.width, canvas.height);
});

window.addEventListener('load',   startLoop);
window.addEventListener('resize', startLoop);
</script>

</body>
</html>
